name: Make TWRP Device Tree (OPPO A11X Fix)

on:
  workflow_dispatch:
    inputs:
      IMG_URL:
        description: 'Recovery 镜像下载直链 (确保是 Raw 链接)'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Check Out
      uses: actions/checkout@main

    - name: Prepare Environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2 git lz4 lzop device-tree-compiler tar
        
        sudo pip3 install --upgrade pip
        # 使用你测试稳定的 2.1.0 版本
        sudo pip3 install twrpdtgen==2.1.0 python-magic
        
        # 克隆你测试成功的 SebaUbuntu AIK 镜像工具
        git clone https://github.com/SebaUbuntu/AIK-Linux-mirror.git $HOME/AIK
        chmod -R 777 $HOME/AIK

    - name: Download and Process Image
      run: |
        # 下载镜像，固定输出文件名，避免同名文件自动重命名
        aria2c -o recovery.img "${{ github.event.inputs.IMG_URL }}"
        if [ ! -f recovery.img ]; then
          echo "下载失败：未找到 recovery.img"
          ls -al
          exit 1
        fi

        cp recovery.img $HOME/AIK/recovery.img

        cd $HOME/AIK
        # 1. 解包镜像
        sudo ./unpackimg.sh recovery.img

        # 2. 【核心修复】针对 OPPO A11X 注入缺失的识别属性
        # 覆盖所有可能的 prop 路径，彻底解决 AssertionError
        for propfile in ramdisk/default.prop ramdisk/prop.default ramdisk/system/etc/prop.default; do
          if [ -f "$propfile" ]; then
            echo "--- 正在修复属性: $propfile ---"
            sudo sh -c "echo 'ro.product.device=PCHM30' >> $propfile"
            sudo sh -c "echo 'ro.product.system.device=PCHM30' >> $propfile"
            sudo sh -c "echo 'ro.product.manufacturer=oppo' >> $propfile"
            sudo sh -c "echo 'ro.product.brand=oppo' >> $propfile"
            sudo sh -c "echo 'ro.product.model=OPPO A11X' >> $propfile"
          fi
        done

        # 3. 重新打包
        sudo ./repackimg.sh

        # 4. 查找生成的镜像输出并移回工作目录
        OUT_IMG=$(find . -maxdepth 1 -type f -name '*new.img' | head -n 1)
        if [ -z "$OUT_IMG" ]; then
          echo "重新打包失败：未找到 *new.img 输出文件"
          ls -al
          find . -type f | sort
          exit 1
        fi

        cp "$OUT_IMG" "$GITHUB_WORKSPACE/recovery_fixed.img"
        cd $GITHUB_WORKSPACE

    - name: Generate Device Tree
      run: |
        mkdir dt
        # 使用修复了属性的镜像生成 DT
        python3 -m twrpdtgen recovery_fixed.img -o dt/ || {
          echo "自动识别仍有异常，尝试强制指定参数生成..."
          python3 -m twrpdtgen recovery_fixed.img --manufacturer oppo --codename PCHM30 -o dt/
        }

    - name: ZIP Device Tree
      if: always()
      run: |
        if [ -d "dt/oppo/PCHM30" ] || [ -d "dt/generic/generic" ]; then
          zip -r DeviceTree_PCHM30.zip ./dt
          echo "✅ 设备树生成成功！"
        else
          echo "❌ 目录为空，生成失败。请检查日志。"
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP_DT_OPPO_A11X
        path: DeviceTree_PCHM30.zip

    - name: Upload to Release (Optional)
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: ./DeviceTree_PCHM30.zip
        name: TWRP_DT_PCHM30-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Build Summary:
          - Device: OPPO A11X (PCHM30)
          - Tool: twrpdtgen 2.1.0 + AIK-SebaUbuntu
          - Status: Fixed ro.product.device missing error.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
